<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI校园助手 - 首页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans SC",system-ui,-apple-system;}
        body{
            background: #f0f7ff;
            background-image: 
                linear-gradient(rgba(33, 150, 243, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(33, 150, 243, 0.04) 1px, transparent 1px);
            background-size: 22px 22px;
            min-height: 100vh;
            padding-bottom: 40px;
        }

  
        .nav{
            background: linear-gradient(90deg, #2196f3, #42a5f5);
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 3px 15px rgba(33, 150, 243, 0.25);
            position: sticky;
            top: 0;
            z-index: 99;
        }
        .nav-title{
            font-size: 23px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn{
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }
        .nav-btn:hover{
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }

        .container{
            max-width: 920px;
            margin: 50px auto;
            padding: 0 20px;
        }


        .card{
            background: white;
            border-radius: 18px;
            padding: 34px;
            margin-bottom: 26px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
            border-top: 3px solid #2196f3;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card::before{
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #2196f3, #64b5f6);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.35s ease;
        }
        .card:hover{
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(33, 150, 243, 0.14);
        }
        .card:hover::before{
            transform: scaleX(1);
        }
        .card-title{
            font-size: 25px;
            font-weight: 700;
            color: #0f4c81;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-desc{
            color: #555;
            font-size: 16px;
            line-height: 1.6;
        }

  
        .header-card{
            background: linear-gradient(135deg, #2196f3, #42a5f5);
            color: white;
            border: none;
            text-align: center;
            padding: 50px 30px;
            position: relative;
        }
        .header-card::after{
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        .header-card .card-title{
            color: white;
            font-size: 34px;
            margin-bottom: 18px;
            justify-content: center;
        }
        .header-card .card-desc{
            color: rgba(255, 255, 255, 0.92);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

       
        .card-title span{
            display: inline-block;
            transition: transform 0.2s;
        }
        .card:hover .card-title span{
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-title">🎓 AI校园助手</div>
        <button class="nav-btn" onclick="logout()">退出登录</button>
    </div>

    <div class="container">
        <div class="card header-card">
            <div class="card-title">一站式校园服务平台</div>
            <div class="card-desc">AI智能问答 · 课程表管理 · 绩点计算 · 后台管理</div>
        </div>

        <div class="card" onclick="location.href='chat.html'">
            <div class="card-title"><span>💬</span> AI智能问答</div>
            <div class="card-desc">课程查询、校规咨询、图书馆开放时间、食堂餐品等校园相关问题，一键问答，快速响应。</div>
        </div>

        <div class="card" onclick="location.href='schedule.html'">
            <div class="card-title"><span>📅</span> 课程表管理</div>
            <div class="card-desc">添加、查看、管理个人课程，清晰展示每周课程安排，告别遗漏上课时间。</div>
        </div>

        <div class="card" onclick="location.href='gpa.html'">
            <div class="card-title"><span>📊</span> 绩点计算器</div>
            <div class="card-desc">输入科目学分与成绩，自动计算平均绩点、总学分，精准掌握学习情况。</div>
        </div>

        <div class="card" onclick="location.href='admin.html'">
            <div class="card-title"><span>🔧</span> 后台管理面板</div>
            <div class="card-desc">管理用户课程、绩点数据，查看AI问答记录，一键清空或导出数据。</div>
        </div>
    </div>

    <script>
        if(localStorage.getItem('isLogin') !== 'true'){
            location.href = 'login.html';
        }
        function logout(){
            localStorage.removeItem('isLogin');
            location.href = 'login.html';
        }
    </script>
</body>
</html>
