<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI校园助手 - 绩点计算</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
        body{
            background: #f0f7ff;
            background-image: 
                linear-gradient(rgba(46, 125, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(46, 125, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
        }
        .nav{
            background: #2196f3;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(33, 150, 243, 0.3);
        }
        .nav-title{
            font-size: 22px;
            font-weight: 600;
        }
        .nav-back{
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .container{
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card{
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-top: 3px solid #2196f3;
        }
        .card-title{
            font-size: 20px;
            font-weight: 600;
            color: #0f4c81;
            margin-bottom: 20px;
        }
        input{
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus{
            border-color: #2196f3;
            box-shadow: 0 0 8px rgba(33, 150, 243, 0.2);
        }
        .add-btn{
            background: #2196f3;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .add-btn:hover{
            background: #1976d2;
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.3);
        }
       
        .gpa-list{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .gpa-item{
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #2196f3;
        }
        .item-info{
            flex: 1;
        }
        .item-detail{
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        .delete-btn{
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .delete-btn:hover{
            background: rgba(244, 67, 54, 0.2);
        }
     
        .result-card{
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border: 1px solid #2196f3;
            text-align: center;
            padding: 25px;
        }
        .result-title{
            font-size: 22px;
            font-weight: 600;
            color: #0f4c81;
            margin-bottom: 15px;
        }
        .result-content{
            font-size: 18px;
            color: #333;
            line-height: 1.8;
        }
        .result-content span{
            color: #2196f3;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-back" onclick="location.href='index.html'">← 首页</div>
        <div class="nav-title">绩点计算器</div>
        <div></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">添加科目</div>
            <input id="credit" placeholder="学分（如：3.0、2.5）" type="number" step="0.1">
            <input id="score" placeholder="成绩（如：85、92）" type="number" min="0" max="100">
            <button class="add-btn" onclick="addSubject()">添加科目</button>
        </div>

        <div class="card-title">我的科目</div>
        <div class="gpa-list" id="gpaList"></div>

        <div class="card result-card" id="resultCard" style="display:none;">
            <div class="result-title">绩点计算结果</div>
            <div class="result-content">
                总学分：<span id="totalCredit">0</span><br>
                平均绩点：<span id="averageGpa">0.00</span>
            </div>
        </div>
    </div>

    <script>
    
        if(localStorage.getItem('isLogin') !== 'true'){
            location.href = 'login.html';
        }

        let subjectList = [];

     
        function getGPA(score){
            if(score >= 90) return 4.0;
            if(score >= 85) return 3.7;
            if(score >= 80) return 3.3;
            if(score >= 75) return 3.0;
            if(score >= 70) return 2.5;
            if(score >= 60) return 1.0;
            return 0.0;
        }

     
        function renderGPA(){
            const gpaList = document.getElementById('gpaList');
            const resultCard = document.getElementById('resultCard');
            const totalCreditEl = document.getElementById('totalCredit');
            const averageGpaEl = document.getElementById('averageGpa');

            if(subjectList.length === 0){
                gpaList.innerHTML = '<div style="text-align:center;padding:30px;color:#999;">暂无科目，点击上方添加吧～</div>';
                resultCard.style.display = 'none';
                return;
            }


            const html = subjectList.map((item, index) => `
                <div class="gpa-item">
                    <div class="item-info">
                        <div class="item-detail">学分：${item.credit} · 成绩：${item.score} · 绩点：${item.gpa.toFixed(2)}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteSubject(${index})">删除</button>
                </div>
            `).join('');
            gpaList.innerHTML = html;

         
            let totalCredit = 0;
            let totalGpa = 0;
            subjectList.forEach(item => {
                totalCredit += item.credit;
                totalGpa += item.credit * item.gpa;
            });
            const averageGpa = totalGpa / totalCredit;


            resultCard.style.display = 'block';
            totalCreditEl.innerText = totalCredit.toFixed(1);
            averageGpaEl.innerText = averageGpa.toFixed(2);

          
            localStorage.setItem('gpaList', JSON.stringify(subjectList));
        }


        window.onload = () => {
            const savedList = JSON.parse(localStorage.getItem('gpaList')||'[]');
            subjectList = savedList;
            renderGPA();
        };

  
        function addSubject(){
            const credit = parseFloat(document.getElementById('credit').value);
            const score = parseInt(document.getElementById('score').value);

            if(isNaN(credit) || isNaN(score) || credit <= 0 || score < 0 || score > 100){
                alert('请输入有效的学分和成绩！（学分>0，成绩0-100）');
                return;
            }

            const gpa = getGPA(score);
            subjectList.push({credit, score, gpa});

            document.getElementById('credit').value = '';
            document.getElementById('score').value = '';

            renderGPA();
        }

    
        function deleteSubject(index){
            subjectList.splice(index, 1);
            renderGPA();
        }
    </script>
</body>
</html>
