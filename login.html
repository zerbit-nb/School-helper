<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI校园助手 - 登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans SC",system-ui,-apple-system;}
        body{
            background: linear-gradient(135deg, #0f4c81, #2196f3, #42a5f5);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

      
        .bg-effect{
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.2;
            background: 
                radial-gradient(circle at 20% 30%, rgba(100, 181, 246, 1) 0%, transparent 25%),
                radial-gradient(circle at 80% 70%, rgba(33, 150, 243, 1) 0%, transparent 25%);
            animation: bgFloat 12s infinite ease-in-out;
        }
        .bg-grid{
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg,rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
        }
        @keyframes bgFloat {
            0%,100%{ transform: scale(1) translate(0,0); }
            50%{ transform: scale(1.05) translate(10px,-10px); }
        }

       
        .login-box{
            position: relative;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 400px;
            padding: 50px 35px;
            border-radius: 22px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            color: white;
            animation: boxPop 0.6s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes boxPop {
            0%{ opacity:0; transform: translateY(30px) scale(0.95); }
            100%{ opacity:1; transform: translateY(0) scale(1); }
        }

        .login-title{
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 36px;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-title::after{
            content: "";
            width: 40px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        .login-title::before{
            content: "";
            width: 40px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        .input-group{
            position: relative;
            margin-bottom: 28px;
        }
        .input-group input{
            width: 100%;
            padding: 15px 22px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.35s ease;
        }
        .input-group input:focus{
            border-color: #64b5f6;
            box-shadow: 0 0 18px rgba(66, 165, 245, 0.4);
            background: rgba(255,255,255,0.18);
        }
        .input-group label{
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.75);
            pointer-events: none;
            transition: all 0.3s ease;
            font-size: 15px;
        }
        .input-group input:focus ~ label,
        .input-group input:valid ~ label{
            top: -11px;
            left: 18px;
            background: rgba(33,150,243,0.8);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #fff;
            font-weight: 500;
        }

       
        .login-btn{
            width: 100%;
            padding: 18px;
            background: #0d47a1; 
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 6px 20px rgba(13, 71, 161, 0.4);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .login-btn:hover{
            transform: translateY(-3px);
            background: #093a8a; 
            box-shadow: 0 10px 25px rgba(13, 71, 161, 0.55);
        }
        .login-btn:active{
            transform: translateY(0);
        }

        .tips{
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-effect"></div>

    <div class="login-box">
        <div class="login-title">🎓 AI校园助手</div>
        <form onsubmit="return login()">
            <div class="input-group">
                <input type="text" id="username" required>
                <label>账号</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required>
                <label>密码</label>
            </div>
            <button type="submit" class="login-btn">安全登录</button>
            <div class="tips">默认账号密码：admin / admin</div>
        </form>
    </div>

    <script>
        function login(){
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if(username === 'admin' && password === 'admin'){
                localStorage.setItem('isLogin', 'true');
                location.href = 'index.html';
                return false;
            }else{
                alert('账号或密码错误！');
                return false;
            }
        }

        if(localStorage.getItem('isLogin') === 'true'){
            location.href = 'index.html';
        }
    </script>
</body>
</html>
